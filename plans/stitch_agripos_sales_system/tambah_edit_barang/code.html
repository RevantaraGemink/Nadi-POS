<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AgriPOS - Tambah/Edit Barang</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#fbf8ff",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed": "#151d1a",
                    "tertiary-fixed-dim": "#bfc9c3",
                    "on-secondary-fixed-variant": "#005303",
                    "on-secondary": "#ffffff",
                    "surface-dim": "#d5d8f9",
                    "inverse-on-surface": "#f0efff",
                    "surface": "#fbf8ff",
                    "primary-fixed-dim": "#a5d0b9",
                    "primary": "#012d1d",
                    "surface-container": "#ececff",
                    "surface-variant": "#dee0ff",
                    "on-background": "#161a32",
                    "on-tertiary": "#ffffff",
                    "surface-container-highest": "#dee0ff",
                    "surface-tint": "#3f6653",
                    "surface-container-low": "#f4f2ff",
                    "secondary-container": "#a4f792",
                    "background": "#fbf8ff",
                    "on-secondary-container": "#267320",
                    "inverse-primary": "#a5d0b9",
                    "on-surface-variant": "#414844",
                    "on-error": "#ffffff",
                    "primary-container": "#1b4332",
                    "tertiary": "#1f2825",
                    "on-primary-fixed": "#002114",
                    "secondary-fixed-dim": "#89da79",
                    "outline-variant": "#c1c8c2",
                    "on-surface": "#161a32",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#717973",
                    "on-tertiary-fixed-variant": "#3f4945",
                    "tertiary-fixed": "#dbe5df",
                    "tertiary-container": "#353e3a",
                    "inverse-surface": "#2b2f48",
                    "on-tertiary-container": "#9fa9a3",
                    "on-primary-fixed-variant": "#274e3d",
                    "secondary-fixed": "#a4f792",
                    "surface-container-high": "#e5e6ff",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#86af99",
                    "on-secondary-fixed": "#002201",
                    "primary-fixed": "#c1ecd4",
                    "secondary": "#1f6d1a",
                    "on-primary": "#ffffff",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin-page": "24px",
                    "unit": "4px",
                    "table-cell-padding": "12px 16px",
                    "gutter": "16px",
                    "input-height": "40px"
            },
            "fontFamily": {
                    "body-lg": ["IBM Plex Sans"],
                    "headline-md": ["IBM Plex Sans"],
                    "headline-lg": ["IBM Plex Sans"],
                    "body-md": ["IBM Plex Sans"],
                    "status-label": ["IBM Plex Sans"],
                    "label-caps": ["JetBrains Mono"],
                    "table-data": ["IBM Plex Sans"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "headline-lg": ["30px", {"lineHeight": "38px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "status-label": ["13px", {"lineHeight": "16px", "fontWeight": "700"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "table-data": ["14px", {"lineHeight": "20px", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex">
<!-- SideNavBar -->
<nav class="hidden md:flex flex-col gap-unit p-4 bg-surface dark:bg-background border-r border-outline-variant dark:border-outline docked left-0 h-full w-64 flat no shadows">
<div class="flex items-center gap-3 mb-8 px-2">
<div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined">storefront</span>
</div>
<div>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">AgriPOS</h1>
<p class="font-label-caps text-label-caps text-on-surface-variant">Agri Retail Management</p>
</div>
</div>
<div class="flex flex-col gap-1">
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-all font-label-caps text-label-caps" href="#">
<span class="material-symbols-outlined" data-icon="point_of_sale">point_of_sale</span>
<span>Kasir</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 bg-primary-container dark:bg-primary-container text-on-primary-container dark:text-on-primary-container font-bold rounded-lg transition-transform font-label-caps text-label-caps" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2" data-weight="fill" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
<span>Inventory</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-all font-label-caps text-label-caps" href="#">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span>Pelanggan</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-all font-label-caps text-label-caps" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span>Laporan</span>
</a>
</div>
</nav>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col min-w-0">
<!-- TopAppBar -->
<header class="bg-surface-container-lowest dark:bg-surface-dim border-b border-outline-variant dark:border-outline docked full-width top-0 flat no shadows flex justify-between items-center w-full px-margin-page h-input-height z-10 sticky top-0 py-6">
<div class="flex items-center gap-4">
<button class="md:hidden text-primary">
<span class="material-symbols-outlined">menu</span>
</button>
<h2 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed hidden md:block">Tambah Barang Baru</h2>
</div>
<div class="flex items-center gap-6">
<div class="text-on-surface-variant font-table-data text-table-data">12 Oct 2023</div>
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>
</div>
<span class="font-table-data text-table-data text-on-surface font-medium">Budi (Kasir)</span>
</div>
</div>
</header>
<!-- Form Content Canvas -->
<div class="flex-1 p-margin-page overflow-y-auto bg-surface">
<div class="max-w-4xl mx-auto">
<!-- Header Mobile (Since TopAppBar title might be hidden) -->
<div class="md:hidden mb-6">
<h2 class="font-headline-md text-headline-md font-bold text-primary">Tambah Barang Baru</h2>
<p class="text-on-surface-variant mt-1 font-body-md text-body-md">Masukkan detail produk inventory.</p>
</div>
<form class="bg-surface-container-lowest border border-outline-variant rounded-xl p-6 lg:p-8 flex flex-col gap-8 shadow-sm">
<!-- Section: Informasi Dasar -->
<div>
<h3 class="font-headline-md text-body-lg font-bold text-primary border-b border-outline-variant pb-2 mb-4">Informasi Dasar</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Nama Produk -->
<div class="flex flex-col gap-1 md:col-span-2">
<label class="font-table-data text-table-data text-on-surface-variant font-medium" for="productName">Nama Produk</label>
<input class="h-input-height px-3 bg-surface border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md text-body-md text-on-surface placeholder-outline" id="productName" placeholder="Contoh: NPK Mutiara 16-16-16" type="text"/>
</div>
<!-- Kategori -->
<div class="flex flex-col gap-1">
<label class="font-table-data text-table-data text-on-surface-variant font-medium" for="category">Kategori</label>
<div class="relative">
<select class="w-full h-input-height px-3 appearance-none bg-surface border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md text-body-md text-on-surface pr-10" id="category">
<option disabled="" selected="" value="">Pilih Kategori</option>
<option value="benih">Benih</option>
<option value="pupuk_cair">Pupuk Cair</option>
<option value="pupuk_padat">Pupuk Padat</option>
<option value="alat_semprot">Alat Semprot</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Satuan -->
<div class="flex flex-col gap-1">
<label class="font-table-data text-table-data text-on-surface-variant font-medium" for="unit">Satuan</label>
<div class="relative">
<select class="w-full h-input-height px-3 appearance-none bg-surface border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md text-body-md text-on-surface pr-10" id="unit">
<option disabled="" selected="" value="">Pilih Satuan</option>
<option value="kg">kg</option>
<option value="liter">liter</option>
<option value="pcs">pcs</option>
<option value="bks">bks</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
</div>
<!-- Section: Harga & Stok -->
<div>
<h3 class="font-headline-md text-body-lg font-bold text-primary border-b border-outline-variant pb-2 mb-4">Harga &amp; Inventory</h3>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<!-- Harga Pokok -->
<div class="flex flex-col gap-1">
<label class="font-table-data text-table-data text-on-surface-variant font-medium" for="costPrice">Harga Pokok (Beli)</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="text-on-surface-variant font-body-md">Rp</span>
</div>
<input class="w-full h-input-height pl-10 pr-3 bg-surface border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md text-body-md text-on-surface text-right" id="costPrice" placeholder="0" type="number"/>
</div>
</div>
<!-- Harga Jual -->
<div class="flex flex-col gap-1">
<label class="font-table-data text-table-data text-on-surface-variant font-medium" for="sellPrice">Harga Jual</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="text-on-surface-variant font-body-md">Rp</span>
</div>
<input class="w-full h-input-height pl-10 pr-3 bg-surface border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md text-body-md text-on-surface text-right" id="sellPrice" placeholder="0" type="number"/>
</div>
</div>
<!-- Stok Awal -->
<div class="flex flex-col gap-1">
<label class="font-table-data text-table-data text-on-surface-variant font-medium" for="initialStock">Stok Awal</label>
<input class="h-input-height px-3 bg-surface border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md text-body-md text-on-surface text-right font-mono" id="initialStock" placeholder="0" type="number"/>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex justify-end gap-4 mt-4 pt-6 border-t border-outline-variant">
<button class="h-input-height px-6 rounded border border-outline-variant text-on-surface hover:bg-surface-container transition-colors font-table-data text-table-data font-medium flex items-center justify-center" type="button">
                            Batal
                        </button>
<button class="h-input-height px-6 rounded bg-secondary text-on-secondary hover:bg-primary transition-colors font-table-data text-table-data font-medium flex items-center justify-center gap-2 shadow-sm" type="submit">
<span class="material-symbols-outlined text-[18px]">save</span>
                            Simpan Barang
                        </button>
</div>
</form>
</div>
</div>
</main>
</body></html>
